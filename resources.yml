    cost: Library/Paid
    audience: [absolute beginner, parent, teacher, career switcher]
    last_checked: 2026-05-16
    notes: Visual and gentle; useful for adults who want concepts to feel less abstract.

  - name: Eloquent JavaScript
    url: https://eloquentjavascript.net/
