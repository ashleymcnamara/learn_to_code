    topics: [command line, git, tools]
    cost: Free
    audience: [intermediate learner, career switcher]
    last_checked: 2026-05-16
    notes: Practical developer workflow after basic programming starts to land.

  - name: OSSU Computer Science
    url: https://github.com/ossu/computer-science
    type: curriculum
    topics: [computer science, self-study]
    cost: Free
    audience: [self-directed learner, advanced learner]
    last_checked: 2026-05-16
    notes: Long-form CS degree-style path using free courses.

  - name: Hello Ruby
    url: https://www.helloruby.com/
