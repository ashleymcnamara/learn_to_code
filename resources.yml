# Curated resource metadata for Learn to Code.
#
# This file is intentionally smaller than the README. It tracks the highest
# priority resources that should be reviewed first during maintenance.

resources:
  - name: Scratch
    url: https://scratch.mit.edu/
    type: tool
    topics: [beginner, kids, creative-coding]
    cost: Free
    audience: [absolute beginner, parent, teacher]
    last_checked: 2026-05-16
    notes: Gentle visual programming environment for first projects.

  - name: Python Programming MOOC
    url: https://programming-25.mooc.fi/
    type: course
    topics: [python, programming fundamentals]
    cost: Free
    audience: [absolute beginner, career switcher]
    last_checked: 2026-05-16
    notes: Current University of Helsinki Python-first course.

  - name: Python for Everybody
    url: https://www.py4e.com/
    type: course
    topics: [python, web, data]
    cost: Free
    audience: [absolute beginner, career switcher]
    last_checked: 2026-05-16
    notes: Friendly adult beginner path with practical examples.

  - name: MDN Learn Web Development
    url: https://developer.mozilla.org/en-US/docs/Learn
    type: docs
    topics: [html, css, javascript, web]
    cost: Free
    audience: [absolute beginner, web learner]
    last_checked: 2026-05-16
    notes: Best canonical starting point for web fundamentals.

  - name: freeCodeCamp
    url: https://www.freecodecamp.org/learn/
    type: course
    topics: [web, javascript, python, data, certificates]
    cost: Free
    audience: [absolute beginner, career switcher]
    last_checked: 2026-05-16
    notes: Interactive curriculum and projects; quality varies by track.

  - name: The Odin Project
    url: https://www.theodinproject.com/
    type: curriculum
    topics: [web, full stack, javascript, ruby]
    cost: Free
    audience: [web learner, career switcher]
    last_checked: 2026-05-16
    notes: Project-based full stack web path.

  - name: CS50x
    url: https://cs50.harvard.edu/x/
    type: course
    topics: [computer science, programming fundamentals]
    cost: Free audit
    audience: [beginner, career switcher]
    last_checked: 2026-05-16
    notes: Broad introduction; motivating but more intense than gentle Python paths.

  - name: MIT OpenCourseWare
    url: https://ocw.mit.edu/
    type: course catalog
    topics: [opencourseware, computer science, math]
    cost: Free materials
    audience: [self-directed learner, advanced learner]
    last_checked: 2026-05-16
    notes: University course materials; best when learner can self-structure.

  - name: The Missing Semester of Your CS Education
    url: https://missing.csail.mit.edu/
